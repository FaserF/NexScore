name: Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Type'
        required: true
        type: choice
        options:
          - stable
          - beta
          - dev
        default: 'stable'
      bump_type:
        description: 'Version Bump. Note: "none" increments the pre-release build number (e.g., beta.1 -> beta.2). If starting from a stable release, it bumps the patch version (e.g., 1.0.0 -> 1.0.1-dev0).'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: 'patch'
      custom_version:
        description: 'Custom target version (Optional, overrides Version Bump, e.g., 1.2.3 or 1.2.3-beta1)'
        required: false
        type: string
        default: ''
      build_apk:
        description: 'Build Android APK'
        required: true
        type: boolean
        default: true
      build_ipa:
        description: 'Build iOS IPA'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-calc:
    name: Calculate Next Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.calc.outputs.VERSION_NAME }}
      tag_name: ${{ steps.calc.outputs.TAG_NAME }}
      docker_tag: ${{ steps.calc.outputs.DOCKER_TAG }}
      is_prerelease: ${{ steps.calc.outputs.IS_PRERELEASE }}
      should_deploy_pages: ${{ steps.calc.outputs.SHOULD_DEPLOY_PAGES }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Needed for tags

      - name: Run Version Manager
          # Run the python script to calculate the version name and tagging info
        id: calc
        run: |
          python3 scripts/version_manager.py \
            --release-type ${{ github.event.inputs.release_type }} \
            --bump-type ${{ github.event.inputs.bump_type }} \
            --commit-sha ${{ github.sha }} \
            --custom-version "${{ github.event.inputs.custom_version }}" >> $GITHUB_OUTPUT

  sync-version:
    name: Sync Repository Version
    needs: version-calc
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Configure Git and pull latest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }}
      - name: Update pubspec.yaml version
        run: |
          sed -i "s/^version: .*/version: ${{ needs.version-calc.outputs.version_name }}/" nexscore/pubspec.yaml
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Generate Manifest and Connections Map
        run: |
          python scripts/generate_manifest.py
      - name: Commit and Push
        run: |
          git add nexscore/pubspec.yaml project_manifest.json project_connections.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: release version ${{ needs.version-calc.outputs.version_name }} and update manifests [skip ci]"
            git push origin HEAD:${{ github.ref_name }} || (git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }})
          fi

  build-android:
    needs: [version-calc, sync-version, create-release]
    if: ${{ always() && needs.version-calc.result == 'success' && needs.create-release.result == 'success' && github.event.inputs.build_apk != 'false' }}
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      sha256: ${{ steps.generate_sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('**/pubspec.lock') }}"
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > nexscore/android/app/google-services.json
        if: env.HAS_ANDROID_SECRET == 'true'
        env:
          HAS_ANDROID_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
      - name: Build APK
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons
          flutter build apk --release --no-pub \
            --build-name=${{ needs.version-calc.outputs.version_name }} \
            --dart-define=APP_VERSION=${{ needs.version-calc.outputs.version_name }} \
            --dart-define=GITHUB_REPOSITORY_URL=https://api.github.com/repos/${{ github.repository }}
        working-directory: nexscore
      - name: Generate SHA256
        id: generate_sha
        run: |
          SHA=$(sha256sum build/app/outputs/flutter-apk/app-release.apk | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "$SHA" > build/app/outputs/flutter-apk/app-release.apk.sha256
        working-directory: nexscore
      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: NexScore-Android
          path: nexscore/build/app/outputs/flutter-apk/app-release.apk*

  build-ios:
    needs: [version-calc, sync-version, create-release]
    if: ${{ always() && needs.version-calc.result == 'success' && needs.create-release.result == 'success' && github.event.inputs.build_ipa != 'false' }}
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('**/pubspec.lock') }}"
      - name: Cache CocoaPods
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: nexscore/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      - name: Decode GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 -d > nexscore/ios/Runner/GoogleService-Info.plist
        if: env.HAS_IOS_SECRET == 'true'
        env:
          HAS_IOS_SECRET: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 != '' }}
      - name: Build IPA (Unsigned)
        run: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          flutter pub run flutter_launcher_icons
          flutter build ipa --no-codesign --release --no-pub \
            --build-name=${{ needs.version-calc.outputs.version_name }} \
            --dart-define=APP_VERSION=${{ needs.version-calc.outputs.version_name }} \
            --dart-define=GITHUB_REPOSITORY_URL=https://api.github.com/repos/${{ github.repository }}
        working-directory: nexscore
      - name: Upload IPA (Artifacts)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: NexScore-iOS
          path: nexscore/build/ios/ipa/*.ipa

  build-web:
    needs: [version-calc, sync-version]
    name: Build Web & Docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_name: ${{ steps.image_name.outputs.IMAGE_NAME }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('**/pubspec.lock') }}"

      - name: Build Web App
        run: |
          flutter pub get
          flutter build web --release --base-href "/NexScore/" \
            --no-pub \
            --dart-define=APP_VERSION=${{ needs.version-calc.outputs.version_name }} \
            --dart-define=IS_BETA=${{ github.event.inputs.release_type == 'beta' }} \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }} \
            --dart-define=GITHUB_REPOSITORY_URL=https://api.github.com/repos/${{ github.repository }}
        working-directory: nexscore

      - name: Upload Web Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nexscore-release-web
          path: nexscore/build/web
          retention-days: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare Image Name
        id: image_name
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/nexscore" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build and push Docker Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./nexscore
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            PREBUILT_PATH=build/web
          tags: |
            ${{ steps.image_name.outputs.IMAGE_NAME }}:latest
            ${{ steps.image_name.outputs.IMAGE_NAME }}:${{ needs.version-calc.outputs.docker_tag }}

  deploy-pwa:
    needs: [version-calc, build-web]
    name: Deploy PWA to GitHub Pages
    uses: ./.github/workflows/deploy_pages.yml
    with:
      deploy_pwa: true
      web_artifact_name: 'nexscore-release-web'
      version_name: ${{ needs.version-calc.outputs.version_name }}
      is_beta: ${{ github.event.inputs.release_type == 'beta' }}

  create-release:
    needs: [version-calc, build-web, deploy-pwa]
    if: |
      always() &&
      needs.version-calc.result == 'success' &&
      needs.build-web.result == 'success' &&
      needs.deploy-pwa.result == 'success'
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Need history for changelog

      - name: Prepare Release Assets
        run: |
          mkdir release_assets

      - name: Generate Changelog
        run: |
          python scripts/generate_changelog.py \
            --release-type ${{ github.event.inputs.release_type }} \
            --repo ${{ github.repository }} \
            --output-file changelog.md

      - name: Prepare Release Notes
        run: |
          APK_ROW="| **Android** | _Building..._ | _TBD_ |"
          IOS_ROW="| **iOS** | _Building..._ | _TBD_ |"

          cat << EOF > release_body.md
          ## 🚀 NexScore ${{ needs.version-calc.outputs.version_name }}

          ### 🌐 Live PWA
          Available at: https://faserf.github.io/NexScore/

          ### 📦 Downloads & Artifacts
          | Platform | File | SHA256 Checksum |
          |----------|------|-----------------|
          $APK_ROW
          $IOS_ROW
          | **Web (Docker)** | \`docker pull ${{ needs.build-web.outputs.image_name }}:${{ needs.version-calc.outputs.docker_tag }}\` | _Container Image_ |
          | **Docs** | [Documentation](https://faserf.github.io/NexScore/docs/) | _Online_ |

          ### 📝 Changes
          EOF
          cat changelog.md >> release_body.md
          echo -e "\n---\n*Released by Orchestrator on $(date +'%Y-%m-%d %H:%M:%S')*" >> release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.version-calc.outputs.tag_name }}
          name: NexScore ${{ needs.version-calc.outputs.version_name }}
          prerelease: ${{ needs.version-calc.outputs.is_prerelease == 'true' }}
          files: release_assets/*
          body_path: release_body.md

  update-release-android:
    needs: [version-calc, create-release, build-android]
    if: always() && needs.create-release.result == 'success' && (needs.build-android.result == 'success' || needs.build-android.result == 'failure' || needs.build-android.result == 'skipped')
    name: Attach Android APK to Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK Artifact
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: NexScore-Android
          path: android_artifacts

      - name: Prepare APK Asset
        if: needs.build-android.result == 'success'
        run: |
          mkdir release_assets
          cp android_artifacts/app-release.apk release_assets/NexScore-v${{ needs.version-calc.outputs.version_name }}.apk
          cp android_artifacts/app-release.apk.sha256 release_assets/NexScore-v${{ needs.version-calc.outputs.version_name }}.apk.sha256

      - name: Upload APK to Release
        if: needs.build-android.result == 'success'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.version-calc.outputs.tag_name }}
          files: release_assets/*

      - name: Update Release Notes with Android APK Info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retrieve current release body
          gh release view ${{ needs.version-calc.outputs.tag_name }} --repo ${{ github.repository }} --json body --template '{{.body}}' > release_body.md
          
          if [ "${{ needs.build-android.result }}" = "success" ]; then
            APK_SHA="${{ needs.build-android.outputs.sha256 }}"
            APK_LINK="[NexScore.apk](https://github.com/${{ github.repository }}/releases/download/${{ needs.version-calc.outputs.tag_name }}/NexScore-v${{ needs.version-calc.outputs.version_name }}.apk)"
            NEW_ROW="| **Android** | $APK_LINK | \`$APK_SHA\` |"
          elif [ "${{ needs.build-android.result }}" = "skipped" ]; then
            NEW_ROW="| **Android** | _Build Skipped_ | _N/A_ |"
          else
            NEW_ROW="| **Android** | _Build Failed_ | _N/A_ |"
          fi
          
          # Only replace if placeholder was set (meaning it was not already updated in create-release)
          if grep -q "| \*\*Android\*\* | _Building..._ | _TBD_ |" release_body.md; then
            sed -i "s|\| \*\*Android\*\* \| \_Building\...\_ \| \_TBD\_ \||$NEW_ROW|g" release_body.md
            gh release edit ${{ needs.version-calc.outputs.tag_name }} --repo ${{ github.repository }} --notes-file release_body.md
          fi

  update-release-ios:
    needs: [version-calc, create-release, build-ios]
    if: always() && needs.create-release.result == 'success' && (needs.build-ios.result == 'success' || needs.build-ios.result == 'failure' || needs.build-ios.result == 'skipped')
    name: Attach iOS IPA to Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download IPA Artifact
        if: needs.build-ios.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: NexScore-iOS
          path: ios_artifacts

      - name: Prepare IPA Asset
        if: needs.build-ios.result == 'success'
        run: |
          mkdir release_assets
          IPA_FILE=$(find ios_artifacts -name "*.ipa" | head -n 1)
          if [ -n "$IPA_FILE" ]; then
            cp "$IPA_FILE" release_assets/NexScore-v${{ needs.version-calc.outputs.version_name }}.ipa
          fi

      - name: Upload IPA to Release
        if: needs.build-ios.result == 'success'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.version-calc.outputs.tag_name }}
          files: release_assets/*

      - name: Update Release Notes with iOS IPA Info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retrieve current release body
          gh release view ${{ needs.version-calc.outputs.tag_name }} --repo ${{ github.repository }} --json body --template '{{.body}}' > release_body.md
          
          if [ "${{ needs.build-ios.result }}" = "success" ]; then
            IPA_LINK="[NexScore.ipa](https://github.com/${{ github.repository }}/releases/download/${{ needs.version-calc.outputs.tag_name }}/NexScore-v${{ needs.version-calc.outputs.version_name }}.ipa)"
            NEW_ROW="| **iOS** | $IPA_LINK | _Unsigned_ |"
          elif [ "${{ needs.build-ios.result }}" = "skipped" ]; then
            NEW_ROW="| **iOS** | _Build Skipped_ | _N/A_ |"
          else
            NEW_ROW="| **iOS** | _Build Failed_ | _N/A_ |"
          fi
          
          # Only replace if placeholder was set (meaning it was not already updated in create-release)
          if grep -q "| \*\*iOS\*\* | _Building..._ | _TBD_ |" release_body.md; then
            sed -i "s|\| \*\*iOS\*\* \| \_Building\...\_ \| \_TBD\_ \||$NEW_ROW|g" release_body.md
            gh release edit ${{ needs.version-calc.outputs.tag_name }} --repo ${{ github.repository }} --notes-file release_body.md
          fi
