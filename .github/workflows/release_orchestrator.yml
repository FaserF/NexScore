# Professional Release Orchestrator for ScorePlay
# Builds APK, IPA, and Docker Web Image. Creates a single consolidated GitHub Release.

name: Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      is_prerelease:
        description: 'Is this a pre-release (Beta)?'
        required: true
        type: boolean
        default: false
      version_name:
        description: 'Version Name (e.g., 0.1.0)'
        required: true
        type: string
        default: '0.1.0'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
        working-directory: score_play
      - name: Run tests
        run: flutter test
        working-directory: score_play

  build-android:
    needs: test
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.generate_sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build APK
        run: |
          DART_DEFINES=""
          if [ "${{ github.event.inputs.is_prerelease }}" = "true" ]; then
            DART_DEFINES="--dart-define=IS_BETA=true"
          fi
          flutter build apk --release $DART_DEFINES
        working-directory: score_play
      - name: Generate SHA256
        id: generate_sha
        run: |
          SHA=$(sha256sum build/app/outputs/flutter-apk/app-release.apk | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "$SHA" > build/app/outputs/flutter-apk/app-release.apk.sha256
        working-directory: score_play
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScorePlay-Android
          path: score_play/build/app/outputs/flutter-apk/app-release.apk*

  build-ios:
    needs: test
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Build IPA (Unsigned)
        run: |
          DART_DEFINES=""
          if [ "${{ github.event.inputs.is_prerelease }}" = "true" ]; then
            DART_DEFINES="--dart-define=IS_BETA=true"
          fi
          flutter build ipa --no-codesign --release $DART_DEFINES
        working-directory: score_play
      - name: Upload IPA (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ScorePlay-iOS
          path: score_play/build/ios/archive/*.xcarchive

  build-web:
    needs: test
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./score_play
          push: true
          build-args: |
            IS_BETA=${{ github.event.inputs.is_prerelease }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/scoreplay:latest
            ghcr.io/${{ github.repository_owner }}/scoreplay:${{ github.event.inputs.version_name }}

  create-release:
    needs: [build-android, build-ios, build-web]
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare Release Assets
        run: |
          mkdir release_assets
          cp artifacts/ScorePlay-Android/app-release.apk release_assets/ScorePlay-v${{ github.event.inputs.version_name }}.apk
          cp artifacts/ScorePlay-Android/app-release.apk.sha256 release_assets/ScorePlay-v${{ github.event.inputs.version_name }}.apk.sha256
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name }}${{ github.event.inputs.is_prerelease == 'true' && '-beta' || '' }}
          name: ScorePlay v${{ github.event.inputs.version_name }}${{ github.event.inputs.is_prerelease == 'true' && ' (Beta)' || '' }}
          prerelease: ${{ github.event.inputs.is_prerelease }}
          files: release_assets/*
          body: |
            ## 🚀 ScorePlay v${{ github.event.inputs.version_name }}

            ### 📦 Downloads & Artifacts
            | Platform | File | SHA256 Checksum |
            |----------|------|-----------------|
            | **Android** | [ScorePlay.apk](https://github.com/${{ github.repository }}/releases/download/v${{ github.event.inputs.version_name }}${{ github.event.inputs.is_prerelease == 'true' && '-beta' || '' }}/ScorePlay-v${{ github.event.inputs.version_name }}.apk) | `${{ needs.build-android.outputs.sha256 }}` |
            | **Web** | `docker pull ghcr.io/${{ github.repository_owner }}/scoreplay:${{ github.event.inputs.version_name }}` | _Container Image_ |

            ---
            *Released by Orchestrator on $(date +'%Y-%m-%d %H:%M:%S')*
