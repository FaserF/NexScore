name: Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Type'
        required: true
        type: choice
        options:
          - stable
          - beta
          - dev
        default: 'stable'
      bump_type:
        description: 'Version Bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: 'patch'

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/validation.yml

  version-calc:
    name: Calculate Next Version
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      version_name: ${{ steps.calc.outputs.VERSION_NAME }}
      tag_name: ${{ steps.calc.outputs.TAG_NAME }}
      docker_tag: ${{ steps.calc.outputs.DOCKER_TAG }}
      is_prerelease: ${{ steps.calc.outputs.IS_PRERELEASE }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Needed for tags

      - name: Run Version Manager
        id: calc
        run: |
          python3 scripts/version_manager.py \
            --release-type ${{ github.event.inputs.release_type }} \
            --bump-type ${{ github.event.inputs.bump_type }} \
            --commit-sha ${{ github.sha }} >> $GITHUB_OUTPUT

  build-android:
    needs: version-calc
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      sha256: ${{ steps.generate_sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Cache Pub dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > nexscore/android/app/google-services.json
        if: env.HAS_ANDROID_SECRET == 'true'
        env:
          HAS_ANDROID_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-pub \
            --build-name=${{ needs.version-calc.outputs.version_name }} \
            --dart-define=APP_VERSION=${{ needs.version-calc.outputs.version_name }}
        working-directory: nexscore
      - name: Generate SHA256
        id: generate_sha
        run: |
          SHA=$(sha256sum build/app/outputs/flutter-apk/app-release.apk | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "$SHA" > build/app/outputs/flutter-apk/app-release.apk.sha256
        working-directory: nexscore
      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: NexScore-Android
          path: nexscore/build/app/outputs/flutter-apk/app-release.apk*

  build-ios:
    needs: version-calc
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Cache Pub dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Decode GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 -d > nexscore/ios/Runner/GoogleService-Info.plist
        if: env.HAS_IOS_SECRET == 'true'
        env:
          HAS_IOS_SECRET: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 != '' }}
      - name: Build IPA (Unsigned)
        run: |
          flutter pub get
          flutter build ipa --no-codesign --release --no-pub \
            --build-name=${{ needs.version-calc.outputs.version_name }} \
            --dart-define=APP_VERSION=${{ needs.version-calc.outputs.version_name }}
        working-directory: nexscore
      - name: Upload IPA (Artifacts)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: NexScore-iOS
          path: nexscore/build/ios/archive/*.xcarchive

  build-web:
    needs: version-calc
    name: Build Web & Docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_name: ${{ steps.image_name.outputs.IMAGE_NAME }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Cache Pub dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Build Web App
        run: |
          flutter pub get
          flutter build web --release --base-href "/NexScore/" \
            --no-pub \
            --dart-define=APP_VERSION=${{ needs.version-calc.outputs.version_name }} \
            --dart-define=IS_BETA=${{ github.event.inputs.release_type == 'beta' }} \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
        working-directory: nexscore

      - name: Upload Web Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: nexscore-release-web
          path: nexscore/build/web
          retention-days: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare Image Name
        id: image_name
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/nexscore" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build and push Docker Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ./nexscore
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            PREBUILT_PATH=build/web
          tags: |
            ${{ steps.image_name.outputs.IMAGE_NAME }}:latest
            ${{ steps.image_name.outputs.IMAGE_NAME }}:${{ needs.version-calc.outputs.docker_tag }}

  deploy-pwa:
    needs: [version-calc, build-web]
    name: Deploy PWA to GitHub Pages
    uses: ./.github/workflows/deploy_pages.yml
    with:
      deploy_pwa: true
      web_artifact_name: 'nexscore-release-web'
      version_name: ${{ needs.version-calc.outputs.version_name }}
      is_beta: ${{ github.event.inputs.release_type == 'beta' }}

  create-release:
    needs: [version-calc, build-android, build-ios, build-web, deploy-pwa]
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Need history for changelog

      - name: Download Artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir release_assets
          cp artifacts/NexScore-Android/app-release.apk release_assets/NexScore-v${{ needs.version-calc.outputs.version_name }}.apk
          cp artifacts/NexScore-Android/app-release.apk.sha256 release_assets/NexScore-v${{ needs.version-calc.outputs.version_name }}.apk.sha256

      - name: Generate Changelog
        id: changelog
        uses: metcalfc/changelog-generator@3f82cef08fe5dcf57c591fe165e70e1d5032e15a # v4.6.2
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-calc.outputs.tag_name }}
          name: NexScore ${{ needs.version-calc.outputs.version_name }}
          prerelease: ${{ needs.version-calc.outputs.is_prerelease == 'true' }}
          files: release_assets/*
          body: |
            ## 🚀 NexScore ${{ needs.version-calc.outputs.version_name }}

            ### 🌐 Live PWA
            Available at: https://faserf.github.io/NexScore/

            ### 📦 Downloads & Artifacts
            | Platform | File | SHA256 Checksum |
            |----------|------|-----------------|
            | **Android** | [NexScore.apk](https://github.com/${{ github.repository }}/releases/download/${{ needs.version-calc.outputs.tag_name }}/NexScore-v${{ needs.version-calc.outputs.version_name }}.apk) | `${{ needs.build-android.outputs.sha256 }}` |
            | **Web (Docker)** | `docker pull ${{ needs.build-web.outputs.image_name }}:${{ needs.version-calc.outputs.docker_tag }}` | _Container Image_ |
            | **Docs** | [Documentation](https://faserf.github.io/NexScore/docs/) | _Online_ |

            ### 📝 Changes
            ${{ steps.changelog.outputs.changelog }}

            ---
            *Released by Orchestrator on $(date +'%Y-%m-%d %H:%M:%S')*
