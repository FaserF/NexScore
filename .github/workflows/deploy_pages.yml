name: Deploy to GitHub Pages

on:
  workflow_call:
    inputs:
      deploy_pwa:
        required: true
        type: boolean
        default: false
      version_name:
        required: false
        type: string
        default: 'latest'
      is_beta:
        required: false
        type: boolean
        default: false
      web_artifact_name:
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      deploy_pwa:
        description: 'Force PWA deployment?'
        required: true
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Download Web Artifact
        if: ${{ inputs.web_artifact_name != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.web_artifact_name }}
          path: nexscore/build/web

      - name: Set up Flutter
        if: ${{ inputs.web_artifact_name == '' && (inputs.deploy_pwa == true || (github.event_name == 'workflow_dispatch' && inputs.deploy_pwa == true) || github.event_name == 'push') }}
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Web App (PWA)
        # ONLY build if no pre-built artifact is provided AND deployment is requested
        if: ${{ (inputs.web_artifact_name == '' || inputs.web_artifact_name == null) && (inputs.deploy_pwa == true || (github.event_name == 'workflow_dispatch' && inputs.deploy_pwa == true)) }}
        run: |
          if [ "${{ inputs.version_name || 'latest' }}" == "latest" ]; then
            APP_VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
            DEPLOY_VERSION="${APP_VERSION}-Pages-${GITHUB_REF_NAME}"
          else
            DEPLOY_VERSION="${{ inputs.version_name }}"
          fi

          # Inject Firebase Secrets into index.html
          if [ -f "web/index.html" ]; then
            sed -i "s/PLACEHOLDER_FIREBASE_API_KEY/${{ secrets.FIREBASE_API_KEY }}/g" web/index.html
            sed -i "s/PLACEHOLDER_FIREBASE_APP_ID/${{ secrets.FIREBASE_APP_ID }}/g" web/index.html
            sed -i "s/PLACEHOLDER_FIREBASE_MEASUREMENT_ID/${{ secrets.FIREBASE_MEASUREMENT_ID }}/g" web/index.html
          fi

          flutter pub get
          flutter build web --release --no-pub --base-href "/NexScore/" \
            --dart-define=APP_VERSION=${DEPLOY_VERSION} \
            --dart-define=IS_BETA=${{ inputs.is_beta || false }} \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
        working-directory: nexscore

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material mkdocs-material-extensions pymdown-extensions

      - name: Build MkDocs
        run: mkdocs build

      - name: Prepare Deployment Directory
        run: |
          mkdir -p gh-pages-build

          # 1. PWA output at root
          if [ -d "nexscore/build/web" ]; then
            cp -R nexscore/build/web/* gh-pages-build/
          fi

          # 2. MkDocs output at /docs/
          mkdir -p gh-pages-build/docs
          if [ -d "site" ]; then
            cp -R site/* gh-pages-build/docs/
          fi

          # 3. SPA Support for root
          touch gh-pages-build/.nojekyll
          if [ -f "gh-pages-build/index.html" ]; then
            cp gh-pages-build/index.html gh-pages-build/404.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: './gh-pages-build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
