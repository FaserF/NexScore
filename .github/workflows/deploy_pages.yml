name: Deploy to GitHub Pages

on:
  push:
    paths:
      - 'docs/**'
    branches:
      - main
  workflow_call:
    inputs:
      deploy_pwa:
        required: true
        type: boolean
        default: false
      version_name:
        required: false
        type: string
        default: 'latest'
      is_beta:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      deploy_pwa:
        description: 'Force PWA deployment?'
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        if: ${{ inputs.deploy_pwa == true || (github.event_name == 'workflow_dispatch' && inputs.deploy_pwa == true) || github.event_name == 'push' }}
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Web App (PWA)
        if: ${{ inputs.deploy_pwa == true || (github.event_name == 'workflow_dispatch' && inputs.deploy_pwa == true) || github.event_name == 'push' }}
        run: |
          flutter pub get
          flutter build web --release --base-href "/NexScore/app/" \
            --dart-define=APP_VERSION=${{ inputs.version_name || 'latest' }} \
            --dart-define=IS_BETA=${{ inputs.is_beta || false }}
        working-directory: nexscore

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material mkdocs-material-extensions pymdown-extensions

      - name: Build MkDocs
        run: mkdocs build

      - name: Prepare Deployment Directory
        run: |
          mkdir -p gh-pages-build

          # 1. MkDocs output at root
          if [ -d "site" ]; then
            cp -R site/* gh-pages-build/
          fi

          # 2. PWA output at /app/
          mkdir -p gh-pages-build/app
          if [ -d "nexscore/build/web" ]; then
            cp -R nexscore/build/web/* gh-pages-build/app/
          fi

          # 3. SPA Support for /app/
          touch gh-pages-build/.nojekyll
          if [ -f "gh-pages-build/app/index.html" ]; then
            cp gh-pages-build/app/index.html gh-pages-build/app/404.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './gh-pages-build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
