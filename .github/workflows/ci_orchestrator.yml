name: NEX CI Orchestrator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'nexscore/**'
              - 'scripts/**'
              - 'pubspec.yaml'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
            workflows:
              - '.github/workflows/**'

  # Combined Validation and Build into one runner to share Flutter environment
  build-android-web:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    name: 1. Validate & Build (Android/Web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('**/pubspec.lock') }}"

      - name: Install dependencies
        run: flutter pub get
        working-directory: nexscore

      - name: Analysis & Tests
        run: |
          flutter analyze
          flutter test
        working-directory: nexscore

      - name: Build Web
        run: |
          # Inject Firebase Secrets into index.html if available
          if [ -f "web/index.html" ]; then
            sed -i "s/PLACEHOLDER_FIREBASE_API_KEY/${{ secrets.FIREBASE_API_KEY }}/g" web/index.html
            sed -i "s/PLACEHOLDER_FIREBASE_APP_ID/${{ secrets.FIREBASE_APP_ID }}/g" web/index.html
            sed -i "s/PLACEHOLDER_FIREBASE_MEASUREMENT_ID/${{ secrets.FIREBASE_MEASUREMENT_ID }}/g" web/index.html
          fi

          flutter build web --release --base-href "/NexScore/" \
            --no-pub \
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
        working-directory: nexscore
      - name: Upload Web Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nexscore-web-pwa
          path: nexscore/build/web
          retention-days: 1
      - name: Build Android APK
        run: flutter build apk --release --no-pub
        working-directory: nexscore
      - name: Build Docker Image
        run: docker build -t nexscore-web:latest -f Dockerfile .
        working-directory: nexscore

  build-ios:
    needs: [changes, build-android-web]
    if: false # Skipped for now to save resources
    name: 3. Build iOS
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: 'stable'
          cache: true
      - name: Cache Pub dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Build iOS IPA (Unsigned)
        run: flutter build ios --release --no-codesign --no-pub
        working-directory: nexscore
