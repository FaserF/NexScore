name: ScorePlay CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: score_play

      - name: Analyze code
        run: flutter analyze
        working-directory: score_play

      - name: Run tests
        run: flutter test
        working-directory: score_play

      - name: Build Web
        run: |
          flutter build web --release --base-href "/"
        working-directory: score_play

      - name: Build Android APK
        run: flutter build apk --release
        working-directory: score_play

      - name: Build Docker Image for Web
        run: |
          docker build -t scoreplay-web:latest -f Dockerfile .
        working-directory: score_play

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: score_play

      - name: Build iOS IPA (Unsigned/Simulator)
        run: flutter build ios --release --no-codesign
        working-directory: score_play
