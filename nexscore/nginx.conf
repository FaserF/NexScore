server {
    listen 80;
    include /etc/nginx/mime.types;

    # Explicit MIME types for Flutter WASM builds
    types {
        application/javascript js mjs;
        application/wasm wasm;
        application/octet-stream bin;
    }

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Disable caching for critical bootstrap files to prevent LinkErrors out of sync
    location ~* \.(js|mjs|wasm|wasm\.gz|html)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Serve Flutter web SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static images and fonts
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
