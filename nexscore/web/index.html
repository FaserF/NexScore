<!DOCTYPE html>
<html lang="en">

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <!-- SEO & Description -->
  <meta name="description"
    content="NexScore – Score tracker for Wizard, Qwixx, Schafkopf, Kniffel, Phase 10, Darts, Rommé & Picolo. Play and track scores cross-platform.">
  <meta name="keywords" content="score tracker, Wizard, Qwixx, Schafkopf, Kniffel, Picolo, card games, board games">
  <meta name="author" content="Fabi Seitz">

  <!-- PWA – Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0175C2">

  <!-- PWA – iOS / Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NexScore">

  <!-- Apple Touch Icons (iOS home screen) -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Apple Splash Screens (portrait) -->
  <link rel="apple-touch-startup-image" href="icons/Icon-512.png">

  <!-- Open Graph (social sharing preview) -->
  <meta property="og:title" content="NexScore">
  <meta property="og:description"
    content="Score tracker for Wizard, Qwixx, Schafkopf, Kniffel, Phase 10, Darts, Rommé & Picolo.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://faserf.github.io/NexScore/">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="NexScore">
  <meta name="twitter:description" content="Universal score tracker for your favourite card and board games.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>NexScore</title>

  <style>
    /* Performance & Smooth Scrolling Tweaks */
    html,
    body {
      background-color: #0F172A;
      /* backgroundDark from app_theme.dart */
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Prevents 'rubber banding' on iOS */
      position: fixed;
      width: 100%;
      height: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      /* Disable system-level touch handling to let Flutter handle 120Hz gestures */
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }

    /* Optimized for high-refresh rate scrolling and interaction */
    canvas {
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      -ms-interpolation-mode: nearest-neighbor;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .loading img {
      width: 156px;
      height: 156px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }

      100% {
        transform: scale(0.95);
        opacity: 0.8;
      }
    }
  </style>
</head>

<body>
  <div id="loading-indicator" class="loading">
    <img src="logo.png" alt="Loading..." />
  </div>

  <script>
    // We rely on standard flutter_bootstrap.js for configuration now.
    // Deprecated window.flutterConfiguration and window.flutterWebRenderer removed.

    // PWA Update Detection
    let newServiceWorker;
    window.flutterUpdateAvailable = false;

    window.addEventListener('load', function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('flutter_service_worker.js?v=' + new Date().getTime()).then(reg => {
          reg.addEventListener('updatefound', () => {
            newServiceWorker = reg.installing;
            newServiceWorker.addEventListener('statechange', () => {
              if (newServiceWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('New update available (PWA)');
                window.flutterUpdateAvailable = true;
                // Notify Flutter if it's already running and has registered a callback
                if (window.onFlutterUpdateAvailable) {
                  window.onFlutterUpdateAvailable();
                }
              }
            });
          });
        });
      }
    });

    window.flutterReloadApp = () => {
      if (newServiceWorker) {
        newServiceWorker.postMessage({ type: 'SKIP_WAITING' });
      }
      window.location.reload();
    };

    // PWA Install Prompt handling
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent the mini-infobar from appearing on mobile
      e.preventDefault();
      // Stash the event so it can be triggered later.
      deferredPrompt = e;
      console.log('beforeinstallprompt event captured');

      // Notify Flutter if it wants to know when the prompt is ready
      if (window.onFlutterInstallPromptReady) {
        window.onFlutterInstallPromptReady();
      }
    });

    window.flutterCanShowInstallPrompt = () => {
      // Return true if we're on web and not already standalone
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      return !isStandalone;
    };

    window.flutterShowInstallPrompt = function () {
      return new Promise(function (resolve) {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function (choiceResult) {
            console.log('User response: ' + choiceResult.outcome);
            deferredPrompt = null;
            resolve(choiceResult.outcome === 'accepted');
          });
        } else {
          resolve(false);
        }
      });
    };
  </script>

  <!-- Firebase SDKs & Analytics -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-analytics.js";

    // These values should be injected at build time or handled via Dart
    const firebaseConfig = {
      apiKey: "PLACEHOLDER_FIREBASE_API_KEY",
      authDomain: "nexscore-app.firebaseapp.com",
      projectId: "nexscore-app",
      storageBucket: "nexscore-app.firebasestorage.app",
      messagingSenderId: "96410867697",
      appId: "PLACEHOLDER_FIREBASE_APP_ID",
      measurementId: "PLACEHOLDER_FIREBASE_MEASUREMENT_ID"
    };

    // Initialize Firebase only if placeholders are replaced
    if (firebaseConfig.apiKey !== "PLACEHOLDER_FIREBASE_API_KEY") {
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      console.log("Firebase Analytics initialized");
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
