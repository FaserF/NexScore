name: nexscore
description: "NexScore – Cross-platform score tracker for Wizard, Qwixx, Schafkopf, Kniffel, SipDeck, Phase 10, Darts (X01), Rommé, and Arschloch/President."
publish_to: 'none'

version: 1.0.0-beta.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  path_provider: ^2.1.3
  share_plus: ^13.1.0
  go_router: ^17.1.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  flex_color_scheme: ^8.4.0
  shared_preferences: ^2.5.4
  uuid: ^4.5.3
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.1
  url_launcher: ^6.3.1
  http: ^1.2.2
  sqflite_common_ffi_web: ^1.1.1
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlite3: ^3.3.0
  flutter_tts: ^4.2.5
  audioplayers: ^6.1.0
  flutter_web_plugins:
    sdk: flutter
  pdf: ^3.11.1
  printing: ^5.13.2
  signature: 6.3.0
  flutter_local_notifications: ^22.0.0
  file_picker: ^12.0.0-beta.5



dev_dependencies:
  sqflite_common_ffi: ^2.3.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.3
  mocktail: ^1.0.4
  test: ^1.25.0
  firebase_core_platform_interface: ^7.0.1

dependency_overrides:
  image: ^4.9.1
  xml: ^7.0.1
  vector_math: ^2.4.0
  flutter_tts:
    path: ./third_party/flutter_tts

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
